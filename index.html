<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neuro Bloom - Creciendo con cada emoción</title>
    
    <link rel="stylesheet" href="styles.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body class="bg-slate-50">
    <div id="root">
        <div class="loading-screen">
            <h2 class="loading-title">Cargando Neuro Bloom...</h2>
            <p>Si este mensaje no desaparece en unos segundos, revisa tu conexión a internet.</p>
        </div>
    </div>

    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            const root = document.getElementById('root');
            root.innerHTML = `
                <div class="error-container">
                    <h3 class="error-title">⚠️ Ocurrió un error al cargar</h3>
                    <p><strong>Mensaje:</strong> ${message}</p>
                    <p><strong>Línea:</strong> ${lineno}</p>
                    <p>Por favor, verifica que tienes conexión a internet.</p>
                </div>
            `;
            console.error(error);
        };
    </script>

    <script type="text/babel">
        try {
            const { useState, useEffect, useRef } = React;

            // --- Iconos Globales ---
            const IconWrapper = ({ name, size = 24, className, color, fill = "none", ...props }) => {
                const iconRef = useRef(null);
                useEffect(() => {
                    if (window.lucide) {
                        window.lucide.createIcons({
                            root: iconRef.current,
                            nameAttr: 'data-lucide',
                            attrs: { width: size, height: size, stroke: color || 'currentColor', fill: fill, class: className, ...props }
                        });
                    }
                }, [name, size, className, color, fill]);
                return <i ref={iconRef} data-lucide={name} style={{ display: 'inline-flex' }}></i>;
            };

            const Heart = (props) => <IconWrapper name="heart" {...props} />;
            const Activity = (props) => <IconWrapper name="activity" {...props} />;
            const HeartHandshake = (props) => <IconWrapper name="heart-handshake" {...props} />;
            const Sun = (props) => <IconWrapper name="sun" {...props} />;
            const Calendar = (props) => <IconWrapper name="calendar" {...props} />;
            const Menu = (props) => <IconWrapper name="menu" {...props} />;
            const X = (props) => <IconWrapper name="x" {...props} />;
            const ArrowLeft = (props) => <IconWrapper name="arrow-left" {...props} />;
            const Shield = (props) => <IconWrapper name="shield" {...props} />;
            const Brain = (props) => <IconWrapper name="brain" {...props} />;
            const BookHeart = (props) => <IconWrapper name="book-heart" {...props} />;
            const PlayCircle = (props) => <IconWrapper name="play-circle" {...props} />;
            const Library = (props) => <IconWrapper name="library" {...props} />;

            // Helper para convertir el nombre de icono del JSON a Componente React
            const getIconComponent = (name, props = {}) => {
                switch(name) {
                    case 'activity': return <Activity {...props} />;
                    case 'heart': return <Heart {...props} />;
                    case 'heart-handshake': return <HeartHandshake {...props} />;
                    case 'sun': return <Sun {...props} />;
                    case 'shield': return <Shield {...props} />;
                    case 'brain': return <Brain {...props} />;
                    case 'book-heart': return <BookHeart {...props} />;
                    case 'play-circle': return <PlayCircle {...props} />;
                    case 'library': return <Library {...props} />;
                    default: return <Activity {...props} />;
                }
            };

            // --- DATOS GLOBALES FIJOS ---
            const colors = {
                primary: '#81638b',
                secondary: '#b695c0',
                lightLilac: '#dac9df',
                actionBlue: '#2196f3',
                skyBlue: '#81c9fa',
                brainGreen: '#9BC496',
                white: '#FFFFFF',
                bgHome: '#FDF2F8',
                bgIndicadores: '#FAF5FF',
                bgBalance: '#EFF6FF',
                bgLibrary: '#F3E8FF',
                bgCapsulas: '#FFF7ED',
                bgCitas: '#F0FDFA'
            };

            const logoUrl = "https://i.ibb.co/WWs5xcSX/Neuro-Bloom-Logo-nbg.png";
            const advertenciaCuestionario = "Este cuestionario es una herramienta de orientación y reflexión personal. No sustituye una evaluación, diagnóstico ni tratamiento psicológico o médico profesional. Si te identificas con varios de los síntomas o sientes que el agotamiento está afectando tu vida diaria, buscar acompañamiento profesional puede ser un paso importante para tu bienestar.";

            // --- COMPONENTES UI ---
            const Logo = ({ className }) => (
                <div className={`flex items-center gap-3 ${className}`}>
                    <img src={logoUrl} alt="Neuro Bloom Logo" className="h-full w-auto object-contain" />
                </div>
            );

            const NavButton = ({ active, onClick, children, icon }) => (
                <button
                    onClick={onClick}
                    className={`flex items-center gap-2 px-4 py-2 rounded-full transition-all duration-300 text-lg font-bold tracking-wide ${
                        active ? 'text-white shadow-md transform scale-105' : 'bg-white/50 hover:bg-white/80'
                    }`}
                    style={{ 
                        backgroundColor: active ? colors.primary : 'rgba(255,255,255,0.5)',
                        color: active ? colors.white : colors.primary
                    }}
                >
                    {React.cloneElement(icon, { size: 20, color: active ? colors.white : colors.primary })}
                    <span className="hidden lg:inline">{children}</span>
                </button>
            );

            // Botón de Regreso Unificado
            const BackButton = ({ onClick, text = "Volver" }) => (
                <button onClick={onClick} className="flex items-center gap-2 mb-8 text-stone-500 hover:text-stone-800 transition-colors font-bold group w-fit">
                    <ArrowLeft size={20} className="group-hover:-translate-x-1 transition-transform" />
                    {text}
                </button>
            );

            const CuestionarioView = ({ data, onBack }) => {
                const [respuestas, setRespuestas] = useState({});
                const [resultado, setResultado] = useState(null);

                const calcularPuntaje = () => {
                    const total = Object.values(respuestas).reduce((a, b) => a + b, 0);
                    setResultado(total);
                };

                return (
                    <div className="animate-fadeIn bg-white p-8 rounded-3xl shadow-sm border border-stone-100 max-w-4xl mx-auto">
                        <BackButton onClick={onBack} text="Volver a Cuestionarios" />
                        
                        <div className="flex items-center gap-4 mb-6">
                            <div className="p-3 rounded-full text-white" style={{ backgroundColor: data.color || colors.primary }}>
                                {getIconComponent(data.icon)}
                            </div>
                            <h2 className="text-3xl font-serif font-bold" style={{ color: colors.primary }}>{data.title}</h2>
                        </div>
                        
                        {data.intro && <p className="text-lg text-stone-600 mb-8 leading-relaxed">{data.intro}</p>}
                        
                        <div className="bg-orange-50 border-l-4 border-orange-400 p-4 mb-10 rounded-r-lg">
                            <p className="text-sm text-orange-800 font-medium">{advertenciaCuestionario}</p>
                        </div>

                        <div className="space-y-8">
                            {data.preguntas.map((pregunta, idx) => (
                                <div key={idx} className="bg-stone-50 p-6 rounded-xl border border-stone-100">
                                    <p className="font-bold text-stone-800 mb-4">{idx + 1}. {pregunta}</p>
                                    <div className="flex flex-wrap gap-3">
                                        {data.opciones.map((opc, oIdx) => (
                                            <button 
                                                key={oIdx}
                                                onClick={() => setRespuestas({...respuestas, [idx]: opc.v})}
                                                className={`px-4 py-2 rounded-full text-sm font-bold transition-all border ${
                                                    respuestas[idx] === opc.v 
                                                    ? 'bg-white shadow-md border-transparent scale-105' 
                                                    : 'bg-transparent border-stone-300 hover:border-stone-400 text-stone-600'
                                                }`}
                                                style={{ color: respuestas[idx] === opc.v ? (data.color || colors.primary) : '' }}
                                            >
                                                {opc.l}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>

                        <div className="mt-10 text-center">
                            <button 
                                onClick={calcularPuntaje}
                                disabled={Object.keys(respuestas).length < data.preguntas.length}
                                className="px-8 py-3 rounded-full text-white font-bold text-lg shadow-lg disabled:opacity-50 disabled:cursor-not-allowed transition-all hover:-translate-y-1"
                                style={{ backgroundColor: colors.primary }}
                            >
                                Ver Resultado Orientativo
                            </button>
                        </div>

                        {resultado !== null && (
                            <div className="mt-10 p-8 rounded-2xl bg-indigo-50 border border-indigo-100 animate-slideIn text-center">
                                <h3 className="text-2xl font-bold mb-4" style={{ color: colors.primary }}>Tu puntuación: {resultado}</h3>
                                <div className="space-y-3 mb-8 text-left max-w-lg mx-auto">
                                    {data.interpretacion.map((int, i) => (
                                        <div key={i} className="p-3 bg-white rounded-lg border border-indigo-50 shadow-sm text-stone-700">
                                            <strong>{int.rango}:</strong> {int.texto}
                                        </div>
                                    ))}
                                </div>
                                {data.guion && (
                                    <div className="p-6 bg-white rounded-xl italic text-stone-600 shadow-sm">
                                        <h4 className="font-bold mb-2 no-italic" style={{ color: colors.primary }}>Reflexión</h4>
                                        "{data.guion}"
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                );
            };

            function NeuroBloom() {
                const [activeSection, setActiveSection] = useState('home');
                const [subView, setSubView] = useState(null);
                const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
                const [indicadoresTab, setIndicadoresTab] = useState('info'); 
                
                const [appData, setAppData] = useState(null);
                const [dataError, setDataError] = useState(false);

                useEffect(() => {
                    fetch('./data.json')
                        .then(res => {
                            if (!res.ok) throw new Error("No se pudo cargar data.json");
                            return res.json();
                        })
                        .then(data => setAppData(data))
                        .catch(err => {
                            console.error(err);
                            setDataError(true);
                        });
                }, []);

                useEffect(() => {
                    setSubView(null);
                }, [activeSection]);

                if (dataError) {
                    return (
                        <div className="loading-screen bg-red-50 text-stone-800 p-8">
                            <h2 className="text-2xl text-red-600 font-bold mb-4">Error de CORS al cargar los datos</h2>
                            <p className="max-w-xl text-center mb-4">
                                Has separado los datos a un archivo <code>data.json</code>. Por medidas de seguridad, los navegadores bloquean la lectura de archivos locales si abres el HTML directamente con doble clic (protocolo <code>file://</code>).
                            </p>
                            <p className="max-w-xl text-center p-4 bg-white rounded-lg border border-red-200">
                                <strong>Solución:</strong> Abre la carpeta de tu proyecto en Visual Studio Code, instala la extensión <strong>"Live Server"</strong> y lanza la página desde ahí.
                            </p>
                        </div>
                    );
                }

                if (!appData) {
                    return (
                        <div className="loading-screen">
                            <h2 className="loading-title animate-pulse">Cargando base de datos Neuro Bloom...</h2>
                        </div>
                    );
                }

                const renderContent = () => {
                    switch (activeSection) {
                        case 'home':
                            return (
                                <div className="animate-fadeIn flex flex-col items-center justify-center text-center py-12">
                                    <img src={logoUrl} alt="Neuro Bloom" className="w-full max-w-lg h-auto mx-auto drop-shadow-sm mb-6" />
                                    
                                    <p className="text-xl md:text-3xl font-serif font-bold tracking-wide mb-8" style={{ color: colors.primary }}>
                                        “Habitarte también es una forma de florecer”
                                    </p>
                                    <p className="max-w-xl mb-12 text-lg text-stone-600 leading-relaxed">
                                        Un espacio dedicado al bienestar emocional, la creatividad y la conexión humana, floreciendo desde el interior.
                                    </p>
                                    
                                    <div className="flex flex-wrap justify-center gap-6 w-full max-w-6xl mt-10">
                                        <div onClick={() => setActiveSection('indicadores')} className="w-full sm:w-[45%] lg:w-[30%] cursor-pointer p-8 rounded-2xl bg-white border shadow-sm hover:shadow-lg transition-all text-center group">
                                            <Activity size={40} className="mx-auto mb-4 transition-transform group-hover:scale-110" style={{ color: colors.primary }} />
                                            <h3 className="font-bold text-lg text-stone-800">Indicadores</h3>
                                        </div>
                                        <div onClick={() => setActiveSection('balance')} className="w-full sm:w-[45%] lg:w-[30%] cursor-pointer p-8 rounded-2xl bg-white border shadow-sm hover:shadow-lg transition-all text-center group">
                                            <Sun size={40} className="mx-auto mb-4 transition-transform group-hover:scale-110" style={{ color: colors.actionBlue }} />
                                            <h3 className="font-bold text-lg text-stone-800">Balance Cotidiano</h3>
                                        </div>
                                        <div onClick={() => setActiveSection('library')} className="w-full sm:w-[45%] lg:w-[30%] cursor-pointer p-8 rounded-2xl bg-white border shadow-sm hover:shadow-lg transition-all text-center group">
                                            <Library size={40} className="mx-auto mb-4 transition-transform group-hover:scale-110" style={{ color: colors.secondary }} />
                                            <h3 className="font-bold text-lg text-stone-800">Bloom Library</h3>
                                        </div>
                                        <div onClick={() => setActiveSection('capsulas')} className="w-full sm:w-[45%] lg:w-[30%] cursor-pointer p-8 rounded-2xl bg-white border shadow-sm hover:shadow-lg transition-all text-center group">
                                            <PlayCircle size={40} className="mx-auto mb-4 transition-transform group-hover:scale-110 text-orange-400" />
                                            <h3 className="font-bold text-lg text-stone-800">Cápsulas en Video</h3>
                                        </div>
                                        <div onClick={() => setActiveSection('citas')} className="w-full sm:w-[45%] lg:w-[30%] cursor-pointer p-8 rounded-2xl bg-white border shadow-sm hover:shadow-lg transition-all text-center group">
                                            <Calendar size={40} className="mx-auto mb-4 transition-transform group-hover:scale-110" style={{ color: colors.brainGreen }} />
                                            <h3 className="font-bold text-lg text-stone-800">Conoce y Agenda</h3>
                                        </div>
                                    </div>
                                </div>
                            );

                        case 'indicadores':
                            if (subView) {
                                const infoData = appData.indicadores?.informacion?.find(d => d.id === subView);
                                if (infoData) {
                                    return (
                                        <div className="animate-fadeIn bg-white p-8 lg:p-12 rounded-3xl shadow-sm border border-stone-100 max-w-4xl mx-auto">
                                            <BackButton onClick={() => setSubView(null)} text="Volver a Información" />
                                            
                                            <div className="flex items-center gap-4 mb-8 border-b border-stone-100 pb-6">
                                                <div className="p-3 rounded-full text-white" style={{ backgroundColor: infoData.color }}>
                                                    {getIconComponent(infoData.icon)}
                                                </div>
                                                <h2 className="text-4xl font-serif font-bold" style={{ color: colors.primary }}>{infoData.title}</h2>
                                            </div>

                                            {/* Aquí se renderiza la imagen si existe en la base de datos */}
                                            {infoData.imagen && (
                                                <div className="mb-10 flex justify-center">
                                                    <img src={infoData.imagen} alt={infoData.title} className="max-w-full rounded-2xl shadow-sm object-contain max-h-[600px]" />
                                                </div>
                                            )}

                                            <div className="space-y-6 text-lg text-stone-700 leading-relaxed font-serif text-justify">
                                                {infoData.contenido.map((parrafo, idx) => (
                                                    <p key={idx}>{parrafo}</p>
                                                ))}
                                            </div>
                                        </div>
                                    );
                                }
                                
                                const testData = appData.indicadores?.cuestionarios?.find(d => d.id === subView);
                                if (testData) {
                                    return <CuestionarioView data={testData} onBack={() => setSubView(null)} />;
                                }
                            }

                            return (
                                <div className="animate-fadeIn max-w-6xl mx-auto space-y-12">
                                    <div className="w-full">
                                        <BackButton onClick={() => setActiveSection('home')} text="Volver al Inicio" />
                                    </div>
                                    <div className="text-center">
                                        <h2 className="text-4xl font-serif font-bold mb-4" style={{ color: colors.primary }}>Indicadores Emocionales</h2>
                                        <p className="text-stone-600 max-w-2xl mx-auto text-lg">Infórmate sobre tu salud emocional y realiza ejercicios de autoexploración para identificar lo que estás sintiendo.</p>
                                    </div>

                                    {/* Tabs */}
                                    <div className="flex justify-center flex-wrap gap-2 sm:gap-4 bg-white p-2 rounded-full shadow-sm border border-stone-100 w-fit mx-auto">
                                        <button 
                                            onClick={() => setIndicadoresTab('info')} 
                                            className={`px-6 sm:px-8 py-3 rounded-full font-bold transition-all ${indicadoresTab === 'info' ? 'text-white shadow-md' : 'text-stone-500 hover:text-stone-800'}`}
                                            style={{ backgroundColor: indicadoresTab === 'info' ? colors.primary : 'transparent' }}>
                                            Información y Lectura
                                        </button>
                                        <button 
                                            onClick={() => setIndicadoresTab('tests')} 
                                            className={`px-6 sm:px-8 py-3 rounded-full font-bold transition-all ${indicadoresTab === 'tests' ? 'text-white shadow-md' : 'text-stone-500 hover:text-stone-800'}`}
                                            style={{ backgroundColor: indicadoresTab === 'tests' ? colors.primary : 'transparent' }}>
                                            Cuestionarios
                                        </button>
                                    </div>

                                    {/* Tab Content */}
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                        {indicadoresTab === 'info' && appData.indicadores?.informacion?.map(item => (
                                            <div key={item.id} onClick={() => setSubView(item.id)} className="cursor-pointer bg-white p-8 rounded-3xl shadow-sm border border-stone-100 hover:border-purple-200 hover:shadow-md transition-all group flex flex-col">
                                                <div className="w-12 h-12 rounded-full flex items-center justify-center mb-6 group-hover:scale-110 transition-transform text-white shadow-sm" style={{ backgroundColor: item.color }}>
                                                    {getIconComponent(item.icon)}
                                                </div>
                                                <h3 className="text-xl font-bold mb-3 text-stone-800 group-hover:text-purple-600 transition-colors">{item.title}</h3>
                                                <p className="text-sm text-stone-500 line-clamp-3 flex-grow">{item.contenido[0]}</p>
                                                <p className="text-sm font-bold text-purple-500 mt-4">Leer más &rarr;</p>
                                            </div>
                                        ))}
                                        
                                        {indicadoresTab === 'tests' && appData.indicadores?.cuestionarios?.map(item => (
                                            <div key={item.id} onClick={() => setSubView(item.id)} className="cursor-pointer bg-white p-8 rounded-3xl shadow-sm border border-stone-100 hover:border-blue-200 hover:shadow-md transition-all group flex flex-col">
                                                <div className="w-12 h-12 rounded-full flex items-center justify-center mb-6 group-hover:scale-110 transition-transform text-white shadow-sm" style={{ backgroundColor: item.color }}>
                                                    {getIconComponent(item.icon)}
                                                </div>
                                                <h3 className="text-xl font-bold mb-3 text-stone-800 group-hover:text-blue-600 transition-colors">{item.title}</h3>
                                                <p className="text-sm text-stone-500 line-clamp-3 flex-grow">{item.intro}</p>
                                                <p className="text-sm font-bold text-blue-500 mt-4">Comenzar Test &rarr;</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            );

                        case 'balance':
                            const balanceData = appData.balance;
                            return (
                                <div className="animate-fadeIn max-w-4xl mx-auto space-y-8">
                                    <div className="w-full">
                                        <BackButton onClick={() => setActiveSection('home')} text="Volver al Inicio" />
                                    </div>
                                    <div className="bg-white p-8 lg:p-12 rounded-3xl shadow-sm border border-stone-100">
                                        <div className="flex items-center gap-4 mb-8 border-b border-stone-100 pb-6">
                                            <div className="p-3 rounded-full text-white" style={{ backgroundColor: balanceData.color }}>
                                                {getIconComponent(balanceData.icon)}
                                            </div>
                                            <h2 className="text-4xl font-serif font-bold" style={{ color: balanceData.color }}>{balanceData.title}</h2>
                                        </div>
                                        
                                        {/* Aquí se renderiza la imagen de Hábitos Sanos si existe en la base de datos */}
                                        {balanceData.imagen && (
                                            <div className="mb-10 flex justify-center">
                                                <img src={balanceData.imagen} alt="Hábitos Sanos" className="max-w-full rounded-2xl shadow-sm object-contain max-h-[800px]" />
                                            </div>
                                        )}

                                        <div className="space-y-6 text-lg text-stone-700 leading-relaxed font-serif text-justify">
                                            {balanceData.contenido.map((parrafo, idx) => (
                                                <p key={idx}>{parrafo}</p>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            );

                        case 'library':
                            if (subView) {
                                const data = appData.cuentos.find(d => d.id === subView);
                                return (
                                    <div className="animate-fadeIn bg-white p-8 lg:p-12 rounded-3xl shadow-sm border border-stone-100 max-w-4xl mx-auto">
                                        <BackButton onClick={() => setSubView(null)} text="Volver a Bloom Library" />
                                        <div className="flex items-center gap-4 mb-8 border-b border-stone-100 pb-6">
                                            <div className="p-3 rounded-full text-white" style={{ backgroundColor: colors.secondary }}>
                                                <BookHeart size={28} />
                                            </div>
                                            <h2 className="text-4xl font-serif font-bold text-stone-800">{data.title}</h2>
                                        </div>
                                        <div className="space-y-6 text-lg text-stone-700 leading-relaxed font-serif text-justify">
                                            {data.contenido.map((parrafo, idx) => (
                                                <p key={idx}>{parrafo}</p>
                                            ))}
                                        </div>
                                    </div>
                                );
                            }

                            const categorias = [
                                { id: 'ninos', title: 'Para Niños', desc: 'Historias llenas de imaginación para descubrir emociones, valores y aprender a gestionarlos.' },
                                { id: 'adolescentes', title: 'Para Adolescentes', desc: 'Relatos sobre la identidad, los cambios, la presión social y el mundo interior en crecimiento.' },
                                { id: 'adultos', title: 'Para Adultos', desc: 'Reflexiones profundas sobre la sanación, los vínculos, las heridas del pasado y el reencuentro personal.' }
                            ];

                            return (
                                <div className="animate-fadeIn max-w-5xl mx-auto">
                                    <div className="w-full mb-6">
                                        <BackButton onClick={() => setActiveSection('home')} text="Volver al Inicio" />
                                    </div>
                                    <div className="text-center mb-12">
                                        <h2 className="text-4xl font-serif font-bold mb-4" style={{ color: colors.secondary }}>Bloom Library</h2>
                                        <p className="text-stone-600 max-w-2xl mx-auto">Un espacio para nutrir tu mente y alma a través de recursos, recomendaciones y cuentos terapéuticos.</p>
                                    </div>

                                    {/* Introducción de Recursos Recomendados */}
                                    <div className="bg-purple-50/50 p-8 lg:p-10 rounded-3xl border border-purple-100 mb-16 shadow-sm">
                                        <h3 className="text-2xl font-bold mb-6 text-purple-800 flex items-center gap-3">
                                            <Library className="text-purple-500" />
                                            Recursos y Recomendaciones
                                        </h3>
                                        <div className="space-y-4 text-stone-700 leading-relaxed">
                                            {appData.bloom_library.intro_text.map((parrafo, i) => (
                                                <p key={i}>{parrafo}</p>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Sección de Cuentos */}
                                    <div className="space-y-12">
                                        <h3 className="text-3xl font-serif font-bold text-center mb-10 text-stone-800">Cuentos para el Alma</h3>
                                        {categorias.map(cat => {
                                            const cuentosCat = appData.cuentos.filter(c => c.categoria === cat.id);
                                            if (cuentosCat.length === 0) return null;
                                            
                                            return (
                                                <div key={cat.id} className="bg-white p-8 rounded-3xl shadow-sm border border-stone-100">
                                                    <h3 className="text-2xl font-bold mb-2 text-stone-800 border-b pb-4">{cat.title}</h3>
                                                    <p className="text-stone-500 mb-6 mt-4">{cat.desc}</p>
                                                    <div className="grid md:grid-cols-2 gap-4">
                                                        {cuentosCat.map(cuento => (
                                                            <div key={cuento.id} onClick={() => setSubView(cuento.id)} className="cursor-pointer group flex items-center justify-between p-5 rounded-2xl border border-stone-100 hover:border-purple-200 hover:bg-purple-50 transition-all shadow-sm hover:shadow-md">
                                                                <div className="flex items-center gap-4">
                                                                    <div className="w-12 h-12 rounded-full bg-purple-100 text-purple-600 flex items-center justify-center group-hover:scale-110 transition-transform">
                                                                        <BookHeart size={20} />
                                                                    </div>
                                                                    <h4 className="font-bold text-lg text-stone-700 group-hover:text-purple-800 transition-colors">{cuento.title}</h4>
                                                                </div>
                                                                <span className="text-purple-400 opacity-0 group-hover:opacity-100 transition-opacity font-bold">&rarr;</span>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            )
                                        })}
                                    </div>
                                </div>
                            );

                        case 'capsulas':
                            return (
                                <div className="animate-fadeIn max-w-4xl mx-auto py-12">
                                    <div className="w-full mb-6">
                                        <BackButton onClick={() => setActiveSection('home')} text="Volver al Inicio" />
                                    </div>
                                    <div className="text-center">
                                        <h2 className="text-4xl font-serif font-bold mb-4 text-orange-500">Cápsulas en Video</h2>
                                        <p className="text-stone-600 mb-12 text-lg">Espacio reservado para próximas reflexiones y guías audiovisuales de Neuro Bloom.</p>
                                        <div className="p-16 bg-white rounded-3xl border border-stone-100 shadow-sm flex flex-col items-center justify-center">
                                            <PlayCircle size={80} className="text-stone-200 mb-6 animate-pulse" />
                                            <h3 className="text-2xl font-bold text-stone-400 mb-2">Próximamente</h3>
                                            <p className="text-stone-400 max-w-md mx-auto">Estamos preparando el contenido en video para acompañar tu proceso de bienestar emocional.</p>
                                        </div>
                                    </div>
                                </div>
                            );

                        case 'citas':
                            return (
                                <div className="animate-fadeIn max-w-5xl mx-auto space-y-12">
                                    <div className="w-full">
                                        <BackButton onClick={() => setActiveSection('home')} text="Volver al Inicio" />
                                    </div>
                                    <div className="text-center">
                                        <h2 className="text-4xl font-serif font-bold mb-4" style={{ color: colors.brainGreen }}>Conoce y Agenda Cita</h2>
                                        <p className="text-stone-600 max-w-2xl mx-auto text-lg">Inicia tu proceso de bienestar emocional. Conoce a nuestros especialistas y reserva tu espacio seguro con nosotros.</p>
                                    </div>

                                    {/* Agenda Section - Especialistas */}
                                    <div className="grid md:grid-cols-2 gap-8">
                                        {appData.especialistas?.map(esp => (
                                            <div key={esp.id} className="bg-white rounded-3xl shadow-sm border border-stone-100 overflow-hidden flex flex-col hover:shadow-lg transition-all group">
                                                <div className="w-full h-72 bg-emerald-50/30 p-4 flex items-center justify-center border-b border-stone-50">
                                                    <img src={esp.imagen} alt={esp.nombre} className="max-h-full max-w-full rounded-2xl shadow-sm object-contain group-hover:scale-105 transition-transform duration-500" />
                                                </div>
                                                <div className="p-8 flex flex-col flex-grow">
                                                    <h3 className="text-2xl font-bold text-stone-800 mb-1">{esp.nombre}</h3>
                                                    <p className="text-emerald-600 font-bold mb-2">{esp.titulo}</p>
                                                    {esp.cedula && <p className="text-xs text-stone-400 mb-4">Cédula: {esp.cedula}</p>}
                                                    <p className="text-stone-600 text-sm mb-6 italic">{esp.descripcion}</p>
                                                    
                                                    <div className="mb-8 flex-grow">
                                                        <h4 className="font-bold text-sm text-stone-800 mb-3 uppercase tracking-wider">Especialidades y Enfoque</h4>
                                                        <ul className="space-y-2">
                                                            {esp.enfoques.map((enfoque, i) => (
                                                                <li key={i} className="text-sm text-stone-600 flex items-start gap-2">
                                                                    <span className="text-emerald-400 mt-0.5"><Heart size={16} fill="currentColor" /></span>
                                                                    {enfoque}
                                                                </li>
                                                            ))}
                                                        </ul>
                                                    </div>
                                                    
                                                    <button className="w-full py-3 rounded-full text-white font-bold shadow-md hover:-translate-y-1 transition-transform flex justify-center items-center gap-2" style={{ backgroundColor: colors.brainGreen }}>
                                                        <Calendar size={18} />
                                                        Agendar Cita
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            );

                        default:
                            return null;
                    }
                };

                const getBgColor = () => {
                    switch(activeSection) {
                        case 'home': return colors.bgHome;
                        case 'indicadores': return colors.bgIndicadores;
                        case 'balance': return colors.bgBalance;
                        case 'library': return colors.bgLibrary;
                        case 'capsulas': return colors.bgCapsulas;
                        case 'citas': return colors.bgCitas;
                        default: return colors.offWhite;
                    }
                };

                return (
                    <div className="min-h-screen transition-colors duration-700 ease-in-out font-sans" style={{ backgroundColor: getBgColor() }}>
                        <header className="sticky top-0 z-50 border-b border-stone-100 backdrop-blur-md bg-white/90">
                            <div className="max-w-7xl mx-auto px-6 h-24 flex items-center justify-between">
                                <div className="cursor-pointer hover:opacity-80 transition-opacity h-full py-3" onClick={() => setActiveSection('home')}>
                                    <Logo className="h-full" />
                                </div>

                                <nav className="hidden lg:flex gap-2">
                                    <NavButton active={activeSection === 'home'} onClick={() => setActiveSection('home')} icon={<Heart />}>Inicio</NavButton>
                                    <NavButton active={activeSection === 'indicadores'} onClick={() => setActiveSection('indicadores')} icon={<Activity />}>Indicadores</NavButton>
                                    <NavButton active={activeSection === 'balance'} onClick={() => setActiveSection('balance')} icon={<Sun />}>Balance</NavButton>
                                    <NavButton active={activeSection === 'library'} onClick={() => setActiveSection('library')} icon={<Library />}>Library</NavButton>
                                    <NavButton active={activeSection === 'capsulas'} onClick={() => setActiveSection('capsulas')} icon={<PlayCircle />}>Cápsulas</NavButton>
                                    <NavButton active={activeSection === 'citas'} onClick={() => setActiveSection('citas')} icon={<Calendar />}>Agenda</NavButton>
                                </nav>

                                <button className="lg:hidden p-2 text-stone-600" onClick={() => setMobileMenuOpen(!mobileMenuOpen)}>
                                    {mobileMenuOpen ? <X size={28} /> : <Menu size={28} />}
                                </button>
                            </div>
                        </header>

                        {mobileMenuOpen && (
                            <div className="fixed inset-0 z-40 pt-24 px-6 lg:hidden animate-slideIn bg-white">
                                <div className="flex flex-col gap-4">
                                    {['home', 'indicadores', 'balance', 'library', 'capsulas', 'citas'].map(sec => (
                                        <button 
                                            key={sec}
                                            onClick={() => { setActiveSection(sec); setMobileMenuOpen(false); }}
                                            className="text-left p-4 rounded-xl font-bold text-lg border border-stone-100 hover:bg-stone-50"
                                            style={{ color: activeSection === sec ? colors.primary : '#444' }}
                                        >
                                            {sec === 'library' ? 'Bloom Library' : sec.charAt(0).toUpperCase() + sec.slice(1)}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        <main className="max-w-7xl mx-auto px-6 py-12 min-h-[80vh]">
                            {renderContent()}
                        </main>

                        <footer className="py-12 mt-12 bg-stone-900 text-stone-400 flex flex-col items-center justify-center text-center">
                            <img 
                                src={logoUrl} 
                                alt="Neuro Bloom Logo Blanco" 
                                className="h-16 w-auto mb-4 opacity-70 brightness-0 invert" 
                            />
                            <p>© {new Date().getFullYear()} Neuro Bloom. Creciendo con cada emoción.</p>
                        </footer>
                    </div>
                );
            }

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<NeuroBloom />);
        } catch (error) {
            console.error(error);
            document.body.innerHTML = '<div class="error-container"><h3 class="error-title">Error Crítico</h3><p>' + error.message + '</p></div>';
        }
    </script>
</body>
</html>
